<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background-image: url("images/chatBG.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

#chatBox {
    width: 400px;
    height: 400px;
    background: white;
    margin: auto;
    padding: 10px;
    overflow-y: auto;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

input {
    width: 300px;
    padding: 10px;
}

button {
    padding: 10px;
    background: #7c5ac9;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

</head>
<body>

<h2>🤖 Ask AI</h2>

<div id="chatBox"></div>

<br>

<input type="text" id="message" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>

<script>

async function sendMessage() {

    const message = document.getElementById("message").value;
    const chatBox = document.getElementById("chatBox");

    chatBox.innerHTML += "<b>You:</b> " + message + "<br><br>";

    const API_KEY = "AIzaSyBdaw98kBnyXx_zaRn4EvIZF6C4kHpk1Rk";

    const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
        {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [
                    {
                        parts: [
                            { text: message }
                        ]
                    }
                ]
            })
        }
    );

    const data = await response.json();

    const reply =
        data?.candidates?.[0]?.content?.parts?.[0]?.text
        || "AI failed to respond.";

    chatBox.innerHTML += "<b>AI:</b> " + reply + "<br><hr>";

    document.getElementById("message").value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>

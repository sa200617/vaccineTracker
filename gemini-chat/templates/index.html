<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-image: url("../images/chatBG.jpg");
    background-size: contain;      
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-color: rgb(126, 33, 86);
    height: 100vh;
    color: white;
}

.title {
    text-align: center;
    font-size: 60px;
    color: rgb(255, 255, 255);
    margin-top: 30px;

    background: rgb(126, 33, 86);      
    padding: 20px;   
    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;           
    border-radius: 20px;           
    width: fit-content;          
    margin-left: auto;
    margin-right: auto;            

    box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
}

.chat-container {
    position: fixed;
    right: 330px;     
    bottom: 38px;      
    width: 400px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

#chatBox {
    height: 400px;
    width: 100%;
    background: rgba(222, 140, 182, 0.95);
    padding: 15px;
    overflow-y: auto;
    border-radius: 15px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.input-wrapper {
    display: flex;
    gap: 10px;
    margin-top: 5px;
}

input[type="text"] {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #d10345;
    color: #fff;
    font-weight: bold;
}

button {
    padding: 10px 20px;
    background: #7c5ac9;
    color: #fff;
    border: none;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
}

button:hover {
    background: #5b3ea6;
    transform: scale(1.05);
}
</style>
</head>
<body>

<div class="title">Dr.Vile's Aid</div>

<div class="chat-container">
    <div id="chatBox"></div>
    <div class="input-wrapper">
        <input type="text" id="message" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    const messageInput = document.getElementById("message");
    const message = messageInput.value.trim();
    if (!message) return;

    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML += "<b>You:</b> " + message + "<br><br>";

    const API_KEY = "AIzaSyBdaw98kBnyXx_zaRn4EvIZF6C4kHpk1Rk";

    try {
        const response = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [
                        { parts: [{ text: message }] }
                    ]
                })
            }
        );

        const data = await response.json();
        const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "AI failed to respond.";
        chatBox.innerHTML += "<b>AI:</b> " + reply + "<br><hr>";
    } catch (err) {
        chatBox.innerHTML += "<b>AI:</b> Error contacting API.<br><hr>";
    }

    messageInput.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>

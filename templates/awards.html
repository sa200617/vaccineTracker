<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Awards Page</title>

<style>
    body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        background-color: #dfc4f0;
        padding: 20px;
        margin: 0;
        text-align: center;
    }

    .container {
        max-width: 900px;
        margin: 0 auto;
        background: #efe7fb;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        position: relative;
    }

    .award-wrapper {
        display: inline-block;
        position: relative;
    }

    .award-img {
        max-width: 100%;
        display: block;
    }

    /* WHITE INFO BOX */
    .info-box {
        position: fixed;       /* fixed to viewport */
        left: 30px;            /* left side */
        top: 50%;              /* vertical middle */
        transform: translateY(-50%);
        width: 300px;
        background: white;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.25);
        text-align: left;
        font-size: 13px;
        max-height: 500px;
        overflow-y: auto;
        line-height: 1.5;
        display: none;
    }

    .info-box ul {
        padding-left: 16px;
        margin: 6px 0;
    }

    .info-box ul li {
        margin-bottom: 4px;
    }

    .info-box .msg-item {
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eee;
    }

    .info-box .msg-item:last-child {
        border-bottom: none;
    }

    .next-btn {
        margin-top: 20px;
        cursor: pointer;
        width: 200px;
    }
</style>
</head>

<body>
<div class="container">
    <h2>Your Vaccination Progress</h2>

    <div class="award-wrapper">
        <img src="images/awards.jpg" class="award-img">
        <div id="infoBox" class="info-box"></div>
    </div>

    <img src="images/nextButton.png"
         class="next-btn"
         onclick="window.location.href='nextpage.html'">
</div>

<script>
/* ─── NORMALIZER ───────────────────────────── */
function normalize(str) {
    return str.toLowerCase().trim().replace(/[?.!]/g,'');
}

/* ─── MESSAGE MAP ──────────────────────────── */
const vaccineMessages = {
    "mmr (measles, mumps, rubella)":
        "MMR vaccination prevents serious outbreaks of measles, mumps, and rubella.",
    "polio":
        "Polio vaccination protects against lifelong paralysis and severe complications.",
    "chickenpox (varicella)":
        "Chickenpox vaccine prevents fever, blisters, and potential adult complications.",
    "hpv (recommended starting age 11-12)":
        "HPV vaccination reduces risk of cervical and other HPV-related cancers.",
    "meningococcal":
        "Meningococcal vaccine protects against life-threatening bacterial infections.",
    "annual flu vaccine":
        "Flu vaccination reduces risk of seasonal influenza and severe illness.",
    "chickenpox":
        "Chickenpox vaccination in adulthood prevents severe illness.",
    "hepatitis b":
        "Hepatitis B vaccine protects the liver from long-term disease.",
    "tdap / td":
        "Tdap/Td boosters prevent tetanus, diphtheria, and pertussis infections.",
    "flu vaccine":
        "Annual flu shots lower risk of serious illness and complications.",
    "covid vaccine":
        "COVID-19 vaccination reduces severe disease and hospitalization.",
    "pneumococcal":
        "Pneumococcal vaccine protects against pneumonia and bloodstream infections.",
    "shingles (shingrix)":
        "Shingles vaccine prevents painful nerve complications in older adults.",
    "have you experienced abnormal vaginal bleeding":
        "Unexpected bleeding may indicate health issues; medical evaluation is advised.",
    "do you experience urinary incontinence or frequent utis":
        "Urinary symptoms can indicate underlying conditions; early management helps.",
    "have you experienced any vaginal bleeding after menopause":
        "Postmenopausal bleeding can indicate serious conditions; assessment is important.",
    "have you had a pap smear in the past 3 years":
        "Pap smears screen for cervical cancer and support early detection.",
    "are your menstrual cycles regular":
        "Regular cycles indicate healthy reproductive function.",
    "pregnancy status":
        "Vaccination recommendations may differ before or during pregnancy.",
};

/* ─── COMPLETE VALUES ───────────────────────── */
const completeValues = ["yes", "completed", "2 doses", "within 10 years"];

/* ─── MAIN LOGIC ───────────────────────────── */
window.addEventListener("DOMContentLoaded", () => {
    const storedData = JSON.parse(localStorage.getItem("formData"));

    const box = document.getElementById("infoBox");

    if (!storedData || !storedData.answers) {
        box.innerHTML = "<strong>⚠ No saved form data found. Fill out the form first.</strong>";
        box.style.display = "block";
        return;
    }

    const incompleteVaccines = [];
    const incompleteScreening = [];

    storedData.answers.forEach(ans => {
        const q = (ans.question || "").toLowerCase().trim();
        const value = (ans.answer || "").toLowerCase().trim();

        const isIncomplete = value === "no" || value === "not started" || value === "partial" || value === "over 10 years" || value === "1 dose";

        if (!isIncomplete) return;

        if (vaccineMessages[q]) {
            incompleteVaccines.push(ans.question);
        } else {
            incompleteScreening.push(ans.question);
        }
    });

    const totalAnswered = storedData.answers.filter(a => {
        const v = (a.answer || "").toLowerCase();
        return v && v !== "select";
    }).length;

    const completed = totalAnswered - incompleteVaccines.length;

    const percent = totalAnswered > 0 ? Math.round((completed / totalAnswered) * 100) : 0;

    // Show vaccines in “You may need”
    let vaccinesHTML = incompleteVaccines.length
        ? incompleteVaccines.map(v => `<li>${v}</li>`).join("")
        : "<li>You're fully protected 🎉</li>";

    // Show screening messages
    let screeningHTML = incompleteScreening.length
        ? incompleteScreening.map(q => `<div class='msg-item'>${vaccineMessages[q.toLowerCase().trim()] || q}</div>`).join("")
        : "<p>All vaccinations and health screenings are up to date.</p>";

    box.innerHTML = `
        <strong style="font-size:15px; color:#3f2a6b;">Vaccination Level: ${percent}%</strong>
        <hr style="margin: 8px 0;">
        <strong>You may need:</strong>
        <ul>
            ${vaccinesHTML}
        </ul>
        <strong>Important Information:</strong>
        <div style="margin-top:6px;">
            ${screeningHTML}
        </div>
    `;

    box.style.display = "block";
});
</script>
</body>
</html>

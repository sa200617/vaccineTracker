<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Awards Page</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background-color: #dfc4f0;
            padding: 20px;
            margin: 0;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #efe7fb;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .award-wrapper {
            position: relative;
            display: inline-block;
        }

        .award-img {
            max-width: 100%;
            display: block;
            border-radius: 12px;
        }

        /* WHITE POPUP BOX */
        .info-box {
            position: absolute;
            width: 300px;
            background: #fff8fc;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            text-align: left;
            font-size: 13px;
            display: none;
            max-height: 420px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .info-box ul {
            padding-left: 16px;
            margin: 6px 0;
        }

        .info-box ul li {
            margin-bottom: 4px;
        }

        .info-box .msg-item {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .info-box .msg-item:last-child {
            border-bottom: none;
        }

        .next-btn {
            margin-top: 20px;
            cursor: pointer;
            width: 200px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Your Vaccination Progress</h2>

    <div class="award-wrapper">
        <img src="images/awards.jpg" class="award-img" alt="Awards">

        <!-- WHITE POPUP -->
        <div id="infoBox" class="info-box"></div>
    </div>

    <img src="images/nextButton.png"
         class="next-btn"
         onclick="window.location.href='nextpage.html'">
</div>

<script>
const vaccineMessages = {
    "mmr (measles, mumps, rubella)": "Measles, mumps, and rubella are highly contagious and can cause serious complications. If you haven't had this vaccine, it's time to get protected!",
    "polio": "Polio can cause permanent paralysis. Completing your vaccine series keeps you safe and helps protect others.",
    "chickenpox (varicella)": "Chickenpox can lead to severe illness in teens. Vaccination prevents outbreaks and complications. Don't wait to get it!",
    "hpv (recommended starting age 11-12)": "HPV vaccines prevent multiple cancers later in life. Early vaccination maximizes protection. Schedule your dose soon!",
    "meningococcal": "Meningococcal infection can be life-threatening. Vaccinate to reduce your risk, especially in school or dorm settings.",
    "annual flu vaccine": "Flu changes every year! Getting your shot protects you and everyone around you.",
    "hepatitis b": "Hepatitis B can severely damage your liver. Complete your series for full protection.",
    "tdap / td": "Tetanus, diphtheria, and pertussis are serious. Stay current with your booster for safety.",
    "flu": "Flu can be dangerous, especially as you age. Get your annual shot!",
    "covid": "COVID can cause severe illness. Keep up-to-date with vaccines to stay safe.",
    "pneumococcal": "Pneumonia and infections are riskier with age. Vaccination is important for protection.",
    "shingles (shingrix)": "Shingles can be painful and affect nerves. Two doses are recommended for full protection.",
    "rsv": "RSV can cause serious lung infections in older adults. Vaccinate to stay safe.",
    "are your menstrual cycles regular?": "Regular cycles indicate healthy hormones. Irregularities should be checked by your doctor.",
    "have you started hpv vaccination?": "HPV vaccines prevent cancers. Starting early is best.",
    "have you experienced abnormal vaginal bleeding?": "Unexpected bleeding may signal health issues. Consult your provider immediately.",
    "do you experience urinary incontinence or frequent utis?": "Urinary symptoms can affect quality of life. Early management is important.",
    "have you had a pap smear in the past 3 years?": "Pap smears screen for cervical cancer. Stay on schedule to catch issues early.",
    "are you currently pregnant or planning pregnancy?": "Vaccines may need adjustment during pregnancy. Consult your doctor for safe options.",
    "have you experienced any vaginal bleeding after menopause?": "Postmenopausal bleeding can indicate serious health issues. Contact your healthcare provider."
};

const completeValues = ["yes","completed","2 doses","within 10 years"];
const symptomQuestions = [
    "have you experienced abnormal vaginal bleeding?",
    "do you experience urinary incontinence or frequent utis?",
    "do you have urinary incontinence or frequent utis?",
    "have you experienced any vaginal bleeding after menopause?"
];

window.addEventListener("DOMContentLoaded", () => {
    const storedData = JSON.parse(localStorage.getItem("formData"));

    if (!storedData || !storedData.answers) {
        alert("⚠ No saved form data found. Fill out the form first.");
        return;
    }

    let completed = 0;
    let needed = [];
    let messages = [];

    storedData.answers.forEach(ans => {
        const rawQuestion = ans.question || "";
        const rawAnswer = ans.answer || "";
        const questionKey = rawQuestion.toLowerCase().trim();
        const value = rawAnswer.toLowerCase().trim();

        if (!value || value === "select" || questionKey === "unknown") return;

        const isComplete = completeValues.some(cv => value === cv || value.includes(cv));
        const isSymptomQ = symptomQuestions.includes(questionKey);
        let needsAction = false;

        if (isSymptomQ) {
            if (value === "yes") needsAction = true;
            else completed++;
        } else {
            if (isComplete) completed++;
            else needsAction = true;
        }

        if (needsAction) {
            let msg = vaccineMessages[questionKey] || "Please check with your healthcare provider about this.";
            needed.push(rawQuestion);
            messages.push({ question: rawQuestion, text: msg });
        }
    });

    const total = storedData.answers.filter(a => a.answer && a.answer.toLowerCase() !== "select").length;
    const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

    const box = document.getElementById("infoBox");

    let msgHTML = messages.map(m => `
        <div class="msg-item">
            <strong style="color:#5b3ea6; font-size:12px;">${m.question}</strong><br>
            <span>${m.text}</span>
        </div>
    `).join("");

    const vaccineNeeded = needed.filter((q,i) => needed.indexOf(q) === i);

    box.innerHTML = `
        <strong style="font-size:15px; color:#3f2a6b;">Vaccination Level: ${percent}%</strong>
        <hr style="margin: 8px 0;">
        <strong>You may need:</strong>
        <ul>
            ${vaccineNeeded.length
                ? vaccineNeeded.map(v => `<li>${v}</li>`).join("")
                : "<li>You're fully protected 🎉</li>"}
        </ul>
        <strong>Important Information:</strong>
        <div style="margin-top:6px;">
            ${messages.length ? msgHTML : "<p>All vaccinations and health checks are up to date.</p>"}
        </div>
    `;
    box.style.display = "block";

    /* POSITION BOX CUTELY */
    if(percent<25){box.style.left="30px"; box.style.bottom="40px";}
    else if(percent<50){box.style.right="30px"; box.style.bottom="120px";}
    else if(percent<75){box.style.left="30px"; box.style.top="180px";}
    else if(percent<100){box.style.right="30px"; box.style.top="120px";}
    else{box.style.left="30px"; box.style.top="40px";}
});
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Awards Page</title>

    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background-color: #dfc4f0;
            padding: 20px;
            margin: 0;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #efe7fb;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .award-wrapper {
            position: relative;
            display: inline-block;
        }

        .award-img {
            max-width: 100%;
            display: block;
        }

        /* WHITE TEXTBOX */
        .info-box {
            position: absolute;
            width: 260px;
            background: white;
            padding: 14px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            text-align: left;
            font-size: 14px;
            display: none;
        }

        .next-btn {
            margin-top: 20px;
            cursor: pointer;
            width: 200px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Your Vaccination Progress</h2>

    <div class="award-wrapper">
        <img src="images/awards.jpg" class="award-img">

        <!-- WHITE TEXTBOX -->
        <div id="infoBox" class="info-box"></div>
    </div>

    <img src="images/nextButton.png"
         class="next-btn"
         onclick="window.location.href='nextpage.html'">
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {
    const storedData = JSON.parse(localStorage.getItem("formData"));

    if (!storedData || !storedData.answers) {
        alert("⚠ No saved form data found. Fill out the form first.");
        return;
    }

    let completed = 0;
    let needed = [];

    storedData.answers.forEach((ans, i) => {
        const value = ans.answer.toLowerCase();

        if (
            value === "yes" ||
            value === "completed" ||
            value === "2 doses" ||
            value === "within 10 years"
        ) {
            completed++;
        } else if (value !== "select") {
            needed.push("Vaccine " + (i + 1));
        }
    });

    const percent = Math.round((completed / storedData.answers.length) * 100);
    const box = document.getElementById("infoBox");

    box.innerHTML = `
        <strong>Vaccination Level: ${percent}%</strong>


        <strong>You may need:</strong>
        <ul>
            ${needed.length ? needed.map(v => `<li>${v}</li>`).join("") : "<li>You're fully protected 🎉</li>"}
        </ul>
    `;

    box.style.display = "block";

    /* POSITION NEXT TO EACH VIAL AREA */
    /* tweak numbers based on your image layout */
    if (percent < 25) {
        box.style.left = "30px";
        box.style.bottom = "40px";
    } else if (percent < 50) {
        box.style.right = "30px";
        box.style.bottom = "120px";
    } else if (percent < 75) {
        box.style.left = "30px";
        box.style.top = "180px";
    } else if (percent < 100) {
        box.style.right = "30px";
        box.style.top = "120px";
    } else {
        box.style.left = "30px";
        box.style.top = "40px";
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Awards Page</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background-color: #dfc4f0;
            padding: 20px;
            margin: 0;
            overflow-x: hidden; /* prevent horizontal scroll */
            text-align: center; /* center content */
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #efe7fb;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        h2 {
            color: #3f2a6b;
        }

        .award-img {
            max-width: 90%; /* scale down on small screens */
            height: auto;
            display: block;
            margin: 20px auto;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Next button styling */
        .next-btn {
            margin-top: 20px;
            cursor: pointer;
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Our Awards</h2>
        <img src="images/awards.jpg" alt="Awards" class="award-img">
        <div>
            <img src="images/nextButton.png" alt="Next" class="next-btn" onclick="goNext()">
        </div>
    </div>

    <script>
        function goNext() {
            window.location.href = "nextpage.html"; // replace with your next page
        }
    </script>
</body>
</html>
